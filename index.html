<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>习惯锻造 — AI智能习惯追踪</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
header{background:#161b22;border-bottom:1px solid #30363d;padding:14px 24px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.logo{font-weight:700;font-size:17px;display:flex;align-items:center;gap:8px}
.logo-icon{background:linear-gradient(135deg,#3fb950,#58a6ff);border-radius:7px;width:30px;height:30px;display:flex;align-items:center;justify-content:center}
main{max-width:640px;margin:0 auto;padding:24px 16px}
.stats-bar{display:flex;gap:8px;margin-bottom:20px}
.stat-card{flex:1;background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px;text-align:center}
.stat-value{font-size:22px;font-weight:700;font-family:'Inter',sans-serif;color:#58a6ff}
.stat-label{font-size:11px;color:#8b949e;margin-top:4px;text-transform:uppercase;letter-spacing:.3px}
.habit-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;transition:all .2s}
.habit-card:hover{border-color:#30363d}
.habit-card.done{opacity:.7}
.habit-card.done .habit-name{text-decoration:line-through;color:#8b949e}
.habit-check{width:22px;height:22px;border:2px solid #30363d;border-radius:6px;flex-shrink:0;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.habit-check.done{background:#3fb950;border-color:#3fb950}
.habit-info{flex:1}
.habit-name{font-weight:600;font-size:14px}
.habit-freq{font-size:11px;color:#8b949e;margin-top:2px}
.habit-streak{display:flex;align-items:center;gap:4px;color:#d29922;font-size:13px;font-weight:600}
.habit-streak.fire{color:#f85149}
.add-card{background:#161b22;border:1px dashed #30363d;border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;justify-content:center;color:#8b949e}
.add-card:hover{border-color:#58a6ff;color:#58a6ff}
.coach-card{background:linear-gradient(135deg,rgba(63,185,80,0.08),rgba(88,166,255,0.08));border:1px solid #30363d;border-radius:10px;padding:16px;margin-bottom:16px}
.coach-icon{font-size:22px;margin-bottom:6px}
.coach-text{font-size:13px;line-height:1.6;color:#c9d1d9}
.coach-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#8b949e;margin-bottom:8px}
.weekly-section{margin-top:24px}
.day-row{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px}
.day-name{width:40px;flex-shrink:0;font-weight:500}
.day-dots{display:flex;gap:4px}
.day-dot{width:16px;height:16px;border-radius:4px;background:#21262d;transition:background .2s}
.day-dot.done{background:#3fb950}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;width:90%;max-width:380px}
.modal h3{font-size:16px;margin-bottom:14px}
.modal input,.modal select{width:100%;padding:9px 12px;background:#0d1117;border:1px solid #30363d;border-radius:7px;color:#c9d1d9;font-size:13px;outline:none;margin-bottom:10px}
.modal input:focus,.modal select:focus{border-color:#58a6ff}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:12px}
.btn{padding:8px 16px;border-radius:7px;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;border:none}
.btn-primary{background:#58a6ff;color:#fff}
.btn-primary:hover{opacity:.88}
.btn-ghost{background:transparent;border:1px solid #30363d;color:#c9d1d9}
.btn-ghost:hover{border-color:#58a6ff;color:#58a6ff}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#161b22;border:1px solid #3fb950;color:#c9d1d9;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:300}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"><span style="font-size:16px;color:#fff">⚡</span></div>
    习惯锻造
  </div>
  <div style="flex:1"></div>
  <div style="font-size:12px;color:#8b949e" id="todayDisplay"></div>
</header>

<main>
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-value" id="streakCount">0</div><div class="stat-label">连续天数</div></div>
    <div class="stat-card"><div class="stat-value" id="totalCount">0</div><div class="stat-label">已完成</div></div>
    <div class="stat-card"><div class="stat-value" id="bestStreak">0</div><div class="stat-label">最长纪录</div></div>
  </div>

  <div class="coach-card" id="coachCard">
    <div class="coach-label">🤖 AI习惯教练</div>
    <div class="coach-text" id="coachText">欢迎使用习惯锻造！添加你的第一个习惯，开始改变之旅吧 💪</div>
  </div>

  <div id="habitList"></div>

  <div class="add-card" onclick="showAddModal()">
    <span style="font-size:20px;font-weight:300">+</span> 添加新习惯
  </div>

  <div class="weekly-section" id="weeklySection" style="display:none">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px">
      <span>📊</span> 本周概览 <span style="font-size:11px;color:#8b949e" id="weekLabel"></span>
    </div>
    <div id="weekDays"></div>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>添加新习惯</h3>
    <input type="text" id="habitNameInput" placeholder="习惯名称 (如：晨跑30分钟)" maxlength="30">
    <select id="habitFreqSelect">
      <option value="daily">每天</option>
      <option value="weekdays">工作日</option>
      <option value="weekly">每周</option>
    </select>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="hideAddModal()">取消</button>
      <button class="btn btn-primary" onclick="saveHabit()">添加</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COACH_TIPS={
  morning:'早起的人比晚起的人效率高30%，坚持就是胜利 🌅',
  streak:'🔥 你正在保持连续！习惯一旦养成，就会变成自动行为',
  fresh:'每个伟大的成就都始于一个决定，今天就行动起来 ✨',
  consistency:'一致性比强度更重要。每天做一点点，胜过偶尔做很多 📈',
  identity:'不要说「我在戒烟」，要说「我不抽烟」。习惯即是身份认同 💪',
  trigger:'给习惯设置一个触发条件：做完X之后，立刻做Y 🎯',
  environment:'环境设计比意志力更可靠。让好习惯更容易，坏习惯更难 🏠',
  celebrate:'每完成一次，给自己一个小奖励。正向反馈是习惯的燃料 🎉',
  restart:'每个人都有中断的时候。重要的是重新开始，而不是放弃 🔄',
  twoMin:'如果不想做，先做2分钟。2分钟后你会发现根本停不下来 ⏱️',
};
const COACH_KEYS=Object.keys(COACH_TIPS);

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

function getToday(){const d=new Date();return d.toISOString().slice(0,10)}
function todayCN(){const d=new Date();const w=['日','一','二','三','四','五','六'];return `${d.getMonth()+1}月${d.getDate()}日 周${w[d.getDay()]}`}

function loadData(){
  const raw=localStorage.getItem('habit_forge');
  if(!raw)return {habits:[],logs:{}};
  try{return JSON.parse(raw)}catch{return {habits:[],logs:{}}}
}

function saveData(d){localStorage.setItem('habit_forge',JSON.stringify(d))}

function getDayOfWeek(){
  const d=new Date().getDay();
  return d===0?6:d-1;
}

function calcStreaks(habits,logs){
  let todayDone=0,total=0,best=0,current=0;
  const today=getToday();
  
  habits.forEach(h=>{
    // Total count
    const dates=Object.keys(logs).filter(d=>logs[d]&&logs[d].includes(h.id));
    total+=dates.length;
    
    // Today
    if(logs[today]&&logs[today].includes(h.id))todayDone++;
    
    // Current streak (daily habits only)
    if(h.freq==='daily'||h.freq==='weekdays'){
      let s=0;
      const d=new Date();
      while(true){
        const ds=d.toISOString().slice(0,10);
        if(logs[ds]&&logs[ds].includes(h.id)){
          s++;d.setDate(d.getDate()-1);
        }else break;
      }
      if(s>current)current=s;
      if(s>best)best=s;
    }
  });
  
  return {todayDone,total,best,current};
}

function getWeekDates(){
  const dates=[];
  const now=new Date();
  const day=now.getDay();
  const mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1));
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    dates.push(d.toISOString().slice(0,10));
  }
  return dates;
}

function getCoachMessage(streak,todayDone,total){
  if(total===0)return COACH_TIPS.fresh;
  if(todayDone===0&&total>0)return COACH_TIPS.restart;
  if(streak>=5)return COACH_TIPS.streak;
  if(streak>=3)return COACH_TIPS.consistency;
  const tip=COACH_KEYS[Math.floor(Math.random()*COACH_KEYS.length)];
  return COACH_TIPS[tip];
}

function render(){
  const data=loadData();
  const {todayDone,total,best,current}=calcStreaks(data.habits,data.logs);
  
  document.getElementById('todayDisplay').textContent=todayCN();
  document.getElementById('streakCount').textContent=current;
  document.getElementById('totalCount').textContent=total;
  document.getElementById('bestStreak').textContent=Math.max(best,current);
  document.getElementById('coachText').textContent=getCoachMessage(current,todayDone,total);
  
  const today=getToday();
  const list=document.getElementById('habitList');
  
  if(!data.habits.length){
    list.innerHTML=`
      <div class="coach-card">
        <div style="text-align:center;padding:20px;color:#8b949e;font-size:14px">
          <div style="font-size:40px;margin-bottom:10px">🌱</div>
          还没有习惯<br>点击下方按钮，添加你的第一个习惯
        </div>
      </div>`;
    document.getElementById('weeklySection').style.display='none';
    return;
  }
  
  list.innerHTML=data.habits.map(h=>{
    const done=today&&logs[today]&&logs[today].includes(h.id);
    return `<div class="habit-card${done?' done':''}">
      <div class="habit-check${done?' done':''}" onclick="toggleHabit('${h.id}')">${done?'✓':''}</div>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        <div class="habit-freq">${freqLabel(h.freq)}</div>
      </div>
      <div class="habit-streak${current>=5?' fire':''}">${done?'🔥':''} ${current}天</div>
      <div style="cursor:pointer;color:#8b949e;font-size:16px" onclick="deleteHabit('${h.id}')">×</div>
    </div>`;
  }).join('');
  
  // Weekly
  const weekDates=getWeekDates();
  document.getElementById('weeklySection').style.display='block';
  const w=['周一','周二','周三','周四','周五','周六','周日'];
  document.getElementById('weekLabel').textContent=`${weekDates[0].slice(5)}-${weekDates[6].slice(5)}`;
  
  document.getElementById('weekDays').innerHTML=weekDates.map((d,i)=>{
    const doneAll=data.habits.every(h=>logs[d]&&logs[d].includes(h.id));
    return `<div class="day-row">
      <div class="day-name">${w[i]}</div>
      <div class="day-dots">${data.habits.map(h=>`<div class="day-dot${logs[d]&&logs[d].includes(h.id)?' done':''}"></div>`).join('')}</div>
    </div>`;
  }).join('');
}

function toggleHabit(id){
  const data=loadData();
  const today=getToday();
  if(!data.logs[today])data.logs[today]=[];
  const idx=data.logs[today].indexOf(id);
  if(idx>-1)data.logs[today].splice(idx,1);
  else data.logs[today].push(id);
  saveData(data);
  render();
  toast(idx>-1?'✅ 取消完成':'✅ 习惯打卡成功');
}

function deleteHabit(id){
  if(!confirm('确定删除该习惯？'))return;
  const data=loadData();
  data.habits=data.habits.filter(h=>h.id!==id);
  Object.keys(data.logs).forEach(d=>{
    if(data.logs[d])data.logs[d]=data.logs[d].filter(h=>h!==id);
  });
  saveData(data);
  render();
  toast('已删除');
}

function showAddModal(){document.getElementById('modalOverlay').classList.add('show');document.getElementById('habitNameInput').focus()}
function hideAddModal(){document.getElementById('modalOverlay').classList.remove('show');document.getElementById('habitNameInput').value=''}

function saveHabit(){
  const name=document.getElementById('habitNameInput').value.trim();
  const freq=document.getElementById('habitFreqSelect').value;
  if(!name||name.length<2){toast('请输入习惯名称');return}
  const data=loadData();
  data.habits.push({id:Date.now().toString(),name,freq,createdAt:getToday()});
  saveData(data);
  hideAddModal();
  document.getElementById('habitNameInput').value='';
  render();
  toast(`✅ 「${name}」已添加`);
}

function freqLabel(f){return f==='daily'?'每天':f==='weekdays'?'工作日':'每周'}

document.getElementById('habitNameInput').addEventListener('keydown',e=>{if(e.key==='Enter')saveHabit()});

render();
</script>
</body>
</html>
